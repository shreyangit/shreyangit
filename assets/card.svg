<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;600&amp;display=swap');
      
      .bg { fill: #070A11; }
      
      .card-bg { fill: #0B0F19; stroke: #D4AF37; stroke-width: 1; rx: 12; ry: 12; }
      
      .card-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; fill: #D4AF37; letter-spacing: 2px; }
      .card-title { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 300; fill: #8B949E; letter-spacing: 5px; text-transform: uppercase; }
      
      .card-contact { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400; fill: #FFFFFF; letter-spacing: 1px; }
      
      .pattern { fill: none; stroke: #1F2937; stroke-width: 0.5; opacity: 0.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- The Metal Card -->
  <g transform="translate(150, 30)">
    <!-- Drop Shadow -->
    <rect width="500" height="140" fill="#000000" opacity="0.5" rx="12" ry="12" x="10" y="10" />
    
    <!-- Card Body -->
    <rect width="500" height="140" class="card-bg" />
    
    <!-- Subtle lines -->
    <line x1="30" y1="30" x2="470" y2="30" class="pattern" />
    <line x1="30" y1="110" x2="470" y2="110" class="pattern" />
    
    <text x="50" y="65" class="card-name">SHREYAN NARULA</text>
    <text x="50" y="85" class="card-title">Software Architect</text>
    
    <text x="280" y="65" class="card-contact">hi@shreyannarula.com</text>
    <text x="280" y="85" class="card-contact">linkedin.com/in/shreyannarula</text>
  </g>
</svg>
