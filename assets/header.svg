<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;600&amp;display=swap');
      
      .bg { fill: #070A11; }
      .grid { fill: url(#gridPattern); opacity: 0.15; }
      .glow { fill: url(#glowGrad); opacity: 0.4; }
      
      .name { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; fill: #FFFFFF; letter-spacing: 1px; }
      .title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 300; fill: #8B949E; letter-spacing: 4px; text-transform: uppercase; }
      .accent { fill: #D4AF37; }
      .text-gold { font-family: 'Playfair Display', serif; font-style: italic; fill: #D4AF37; }
      
      .line { stroke: #1F2937; stroke-width: 1; }
      .accent-line { stroke: #D4AF37; stroke-width: 2; stroke-dasharray: 4 4; }
    </style>
    
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
    </pattern>
    
    <radialGradient id="glowGrad" cx="50%" cy="0%" r="70%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#1A2436" />
      <stop offset="100%" stop-color="#070A11" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" class="grid" />
  <rect width="100%" height="100%" class="glow" />

  <!-- Decorative elements -->
  <line x1="0" y1="20" x2="800" y2="20" class="line" />
  <line x1="0" y1="230" x2="800" y2="230" class="line" />
  <line x1="40" y1="0" x2="40" y2="250" class="line" />
  <line x1="760" y1="0" x2="760" y2="250" class="line" />
  
  <rect x="35" y="15" width="10" height="10" fill="#070A11" stroke="#374151" stroke-width="1"/>
  <rect x="755" y="15" width="10" height="10" fill="#070A11" stroke="#374151" stroke-width="1"/>
  <rect x="35" y="225" width="10" height="10" fill="#070A11" stroke="#374151" stroke-width="1"/>
  <rect x="755" y="225" width="10" height="10" fill="#070A11" stroke="#374151" stroke-width="1"/>

  <!-- Content -->
  <text x="80" y="110" class="title">Software Architect &amp; Developer</text>
  <text x="80" y="160" class="name">SHREYAN <tspan class="text-gold">NARULA</tspan></text>
  
  <line x1="80" y1="180" x2="200" y2="180" class="accent-line" />
  
  <text x="80" y="205" class="title" style="font-size: 11px; letter-spacing: 2px;">Building Scalable, High-Conversion Platforms. No Boilerplate.</text>

</svg>
