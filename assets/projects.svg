<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;600&amp;display=swap');
      
      .bg { fill: #070A11; }
      .card-bg { fill: #0B0F19; stroke: #1F2937; stroke-width: 1; rx: 8; ry: 8; }
      
      .section-title { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; fill: #D4AF37; letter-spacing: 4px; text-transform: uppercase; }
      
      .proj-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; fill: #FFFFFF; }
      .proj-desc { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; fill: #8B949E; line-height: 1.6; }
      
      .tag-bg { fill: #111827; stroke: #374151; stroke-width: 1; rx: 4; ry: 4; }
      .tag-text { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 400; fill: #9CA3AF; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <text x="40" y="40" class="section-title">❖ Selected Work</text>

  <!-- Card 1: Ventlr -->
  <g transform="translate(40, 70)">
    <rect width="350" height="160" class="card-bg" />
    <text x="25" y="40" class="proj-title">Ventlr</text>
    <text x="25" y="65" class="proj-desc">The Anonymous Campus Network.</text>
    <text x="25" y="85" class="proj-desc">Zero-knowledge proof platform guaranteeing</text>
    <text x="25" y="105" class="proj-desc">absolute anonymity. No boilerplate MVP.</text>
    
    <g transform="translate(25, 125)">
      <rect x="0" y="0" width="60" height="20" class="tag-bg"/>
      <text x="8" y="13" class="tag-text">NEXT.JS</text>
      
      <rect x="70" y="0" width="85" height="20" class="tag-bg"/>
      <text x="78" y="13" class="tag-text">ZK-PROOFS</text>
      
      <rect x="165" y="0" width="80" height="20" class="tag-bg"/>
      <text x="173" y="13" class="tag-text">POSTGRES</text>
    </g>
  </g>

  <!-- Card 2: GetHiredInX -->
  <g transform="translate(410, 70)">
    <rect width="350" height="160" class="card-bg" />
    <text x="25" y="40" class="proj-title">GetHiredInX</text>
    <text x="25" y="65" class="proj-desc">Accelerated Career Engine.</text>
    <text x="25" y="85" class="proj-desc">Algorithmic matching for top talent and</text>
    <text x="25" y="105" class="proj-desc">high-growth startups. Sub-100ms latency.</text>
    
    <g transform="translate(25, 125)">
      <rect x="0" y="0" width="55" height="20" class="tag-bg"/>
      <text x="8" y="13" class="tag-text">REACT</text>
      
      <rect x="65" y="0" width="65" height="20" class="tag-bg"/>
      <text x="73" y="13" class="tag-text">NODE.JS</text>
      
      <rect x="140" y="0" width="55" height="20" class="tag-bg"/>
      <text x="148" y="13" class="tag-text">REDIS</text>
    </g>
  </g>

  <!-- Card 3: GetSponsoredJob -->
  <g transform="translate(40, 250)">
    <rect width="350" height="160" class="card-bg" />
    <text x="25" y="40" class="proj-title">GetSponsoredJob</text>
    <text x="25" y="65" class="proj-desc">Global Mobility Platform.</text>
    <text x="25" y="85" class="proj-desc">Complex data pipelines aggregating visa</text>
    <text x="25" y="105" class="proj-desc">sponsorship data across 50+ countries.</text>
    
    <g transform="translate(25, 125)">
      <rect x="0" y="0" width="60" height="20" class="tag-bg"/>
      <text x="8" y="13" class="tag-text">PYTHON</text>
      
      <rect x="70" y="0" width="65" height="20" class="tag-bg"/>
      <text x="78" y="13" class="tag-text">FASTAPI</text>
      
      <rect x="145" y="0" width="65" height="20" class="tag-bg"/>
      <text x="153" y="13" class="tag-text">DOCKER</text>
    </g>
  </g>

  <!-- Card 4: Situation First -->
  <g transform="translate(410, 250)">
    <rect width="350" height="160" class="card-bg" />
    <text x="25" y="40" class="proj-title">Situation First</text>
    <text x="25" y="65" class="proj-desc">Real-time Crisis Management.</text>
    <text x="25" y="85" class="proj-desc">Event-driven architecture for massive</text>
    <text x="25" y="105" class="proj-desc">concurrent emergency tracking via WSS.</text>
    
    <g transform="translate(25, 125)">
      <rect x="0" y="0" width="35" height="20" class="tag-bg"/>
      <text x="8" y="13" class="tag-text">GO</text>
      
      <rect x="45" y="0" width="85" height="20" class="tag-bg"/>
      <text x="53" y="13" class="tag-text">WEBSOCKETS</text>
      
      <rect x="140" y="0" width="85" height="20" class="tag-bg"/>
      <text x="148" y="13" class="tag-text">KUBERNETES</text>
    </g>
  </g>

</svg>
